version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: goleate-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dorianless
      POSTGRES_DB: goleate
    ports:
      - "5432:5432"
    volumes:
      - goleate-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: goleate-redis
    ports:
      - "6379:6379"
    volumes:
      - goleate-redis-data:/data
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: goleate-backend
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    environment:
      - DATABASE_URL=postgresql://postgres:dorianless@postgres:5432/goleate?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=super_secret_goleate_key_2026
      - FOOTBALL_DATA_API_KEY=${FOOTBALL_DATA_API_KEY:-your_football_data_api_key}
      - EMAIL_API_KEY=${EMAIL_API_KEY:-your_email_api_key}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY:-your_sendgrid_api_key}
      - GROQ_API_KEY=${GROQ_API_KEY:-your_groq_api_key}
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: goleate-frontend
    ports:
      - "3001:3001"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3000
      - PORT=3001
    restart: unless-stopped

volumes:
  goleate-postgres-data:
  goleate-redis-data:
